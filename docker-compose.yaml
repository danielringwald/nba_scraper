services:
  postgres:
    image: postgres:17
    container_name: nba-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: nba_user
      POSTGRES_PASSWORD: nba_password
      POSTGRES_DB: nba_database

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba_user -d nba_database"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: